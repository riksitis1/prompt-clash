services:
  - type: web
    name: prompt-clash
    runtime: node
    repo: https://github.com/riksitis1/concept-battle-game
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: "3000"
